name: Publish to NuGet

# Deliberate release trigger only — push a tag like v1.0.1 to publish.
# Never publishes on a plain commit/PR push, so a WIP push can't accidentally
# ship a broken package.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for NuGet Trusted Publishing (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Derive package version from tag
        shell: bash
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore Paysky.Identity.Keycloak.slnx

      - name: Build
        run: dotnet build Paysky.Identity.Keycloak.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/Paysky.Identity.Keycloak.UnitTests/Paysky.Identity.Keycloak.UnitTests.csproj -c Release --no-build

      - name: Pack
        run: dotnet pack Paysky.Identity.Keycloak.slnx -c Release -o nupkgs -p:Version=${{ env.PACKAGE_VERSION }} --no-build

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: NuGet push
        shell: bash
        run: |
          for pkg in nupkgs/*.nupkg nupkgs/*.snupkg; do
            [ -f "$pkg" ] || continue
            dotnet nuget push "$pkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
